<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        form { border: 1px solid #000; padding: 40px; border-radius: 15px; text-align: center; }
        input { display: block; margin: 10px auto; padding: 10px; width: 200px; }
    </style>
</head>
<body>
    <form action="/login" method="POST">
        <h2>Admin Access</h2>
        <input type="password" name="password" placeholder="Enter Password" required>
        <button type="submit" style="background:#000; color:#fff; padding:10px 20px; border:none; cursor:pointer;">Login</button>
    </form>
</body>
</html>
